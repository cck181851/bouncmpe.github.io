name: Seminar Submission
description: Submit a seminar event (EN + TR)
title: "[Seminar] <Insert seminar title>"
labels: ["event", "event-seminar"]
body:
  - type: input
    id: title_en
    attributes:
      label: "Event Title (EN)"
    validations:
      required: true

  - type: input
    id: title_tr
    attributes:
      label: "Event Title (TR)"
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: "Speaker/Presenter Name"
    validations:
      required: true

  - type: input
    id: datetime
    attributes:
      label: "Date and Time (ISO format)"
    validations:
      required: true

  - type: input
    id: duration
    attributes:
      label: "Duration"
    validations:
      required: true

  - type: input
    id: location_en
    attributes:
      label: "Location (EN)"
    validations:
      required: true

  - type: input
    id: location_tr
    attributes:
      label: "Location (TR)"
    validations:
      required: true

  - type: textarea
    id: image_markdown
    attributes:
      label: "Image (optional)"
      placeholder: "![poster](https://...)"

  - type: textarea
    id: description_en
    attributes:
      label: "Description (EN)"
    validations:
      required: true

  - type: textarea
    id: description_tr
    attributes:
      label: "Description (TR)"
    validations:
      required: true

