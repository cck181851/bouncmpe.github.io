name: Seminar Event Submission
description: Submit a seminar event in English and Turkish.
title: "[EVENT][Seminar] <Insert English title here>"
labels: ["event","seminar"]
body:
  - type: dropdown
    id: event_type
    attributes:
      label: "Event Type"
      options:
        - seminar
      description: "Fixed to Seminar events"
    validations:
      required: true

  - type: input
    id: title_en
    attributes:
      label: "Event Title (EN)"
      placeholder: "Quantum Computing 101"
    validations:
      required: true

  - type: input
    id: title_tr
    attributes:
      label: "Event Title (TR)"
      placeholder: "Kuantum Hesaplama 101"
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: "Speaker/Presenter Name"
      placeholder: "Prof. Alice Lee"
    validations:
      required: true

  - type: input
    id: datetime
    attributes:
      label: "Date and Time (ISO format)"
      placeholder: "2025-09-05T16:00:00"
    validations:
      required: true

  - type: dropdown
    id: duration
    attributes:
      label: "Duration"
      options:
        - 1h
        - 1.5h
        - 2h
      description: "How long the event will last"
    validations:
      required: true

  - type: input
    id: location_en
    attributes:
      label: "Location (EN)"
      placeholder: "Seminar Room B"
    validations:
      required: true

  - type: input
    id: location_tr
    attributes:
      label: "Location (TR)"
      placeholder: "Seminer Salonu B"
    validations:
      required: true

  - type: textarea
    id: image_markdown
    attributes:
      label: "Poster Image (optional)"
      description: "Drag & drop a poster image; GitHub will provide a Markdown link."
      placeholder: "![alt](https://user-images.githubusercontent.com/.../poster.png)"

  - type: textarea
    id: description_en
    attributes:
      label: "Short Description (EN)"
      placeholder: "An introduction to quantum computing."
    validations:
      required: true

  - type: textarea
    id: description_tr
    attributes:
      label: "Short Description (TR)"
      placeholder: "Kuantum hesaplamaya giriş."
    validations:
      required: true
